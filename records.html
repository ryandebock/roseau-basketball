<!DOCTYPE html>
<html lang="en">
    <header>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, intial-scale=1.0">
        <title>Roseau Rams Basketball</title>
        <link rel="stylesheet" href="styles/styles.css">
        <link rel="stylesheet" href="styles/records.css">
    </header>
    <body>
        <h1>Roseau Rams Basketball</h1>
        <div>
            <nav>
                <button class="nav-toggle" aria-label="Toggle navigation">
                    <span class="hamburger"></span>
                    <span class="hamburger"></span>
                    <span class="hamburger"></span>
                    <span class="hamburger"></span>
                </button>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="news.html">News</a></li>
                    <li><a href="schedule.html">Schedule</a></li>
                    <li><a href="stats.html">Stats</a></li>
                    <li><a href="records.html">Records</a></li>
                </ul>
            </nav>
        </div>
        <div class="records-wrap">
            <div class="records-toggle-row">
                <p class="toggle-desc">Toggle Records</p>
                <div class="records-toggle-labels">
                    <span id="records-individual-label" class="active-label">Individual</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="records-toggle">
                        <span class="slider"></span>
                    </label>
                    <span id="records-team-label">Team</span>
                </div>
            </div>
            <div class="records-pills" id="records-pills"></div>
            <p id="records-status">Loading records&hellip;</p>
            <div class="records-table-scroll">
                <table class="records-table" id="records-table" style="display:none;">
                    <caption id="records-caption"></caption>
                    <thead>
                        <tr id="records-head-row"></tr>
                    </thead>
                    <tbody id="records-body"></tbody>
                </table>
            </div>
            <p class="records-note" id="records-active-note" style="display:none;">* Active player, total still increasing</p>
        </div>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
        <script src="scripts/script.js"></script>
        <script src="scripts/records.js"></script>
    </body>

</html>
