<!DOCTYPE html>
<html lang="en">
    <header>
        <meta charset="UTF-8">

        <title>Roseau Rams Basketball</title>
        <link rel="stylesheet" href="../styles/styles.css">

            <p class="record-line" id="record-line"></p>
            <p id="schedule-status">Loading schedule&hellip;</p>
