<!DOCTYPE html>
<html lang="en">
    <header>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, intial-scale=1.0">
        <title>Roseau Rams Basketball</title>
        <link rel="stylesheet" href="styles/styles.css">
        <link rel="stylesheet" href="styles/home.css">
    </header>
    <body>
        <h1>Roseau Rams Basketball</h1>
        <div>
            <nav>
                <button class="nav-toggle" aria-label="Toggle navigation">
                    <span class="hamburger"></span>
                    <span class="hamburger"></span>
                    <span class="hamburger"></span>
                    <span class="hamburger"></span>
                </button>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="news.html">News</a></li>
                    <li><a href="schedule.html">Schedule</a></li>
                    <li><a href="stats.html">Stats</a></li>
                </ul>
            </nav>
        </div>
        <div class="container">
            <img src="assets/ram1.png" alt="Ram Logo">
            <div class="home-schedule-wrap">
                <div class="home-toggle-row">
                    <p class="toggle-desc">Toggle Schedules</p>
                    <div class="home-toggle-labels">
                        <span id="home-varsity-label" class="active-label">Varsity</span>
                        <label class="toggle-switch">
                            <input type="checkbox" id="home-toggle">
                            <span class="slider"></span>
                        </label>
                        <span id="home-jh-label">JH</span>
                    </div>
                </div>
                <div id="home-varsity-table" class="week-table-card" style="display: block;">
                    <table>
                        <caption id="varsity-caption">Varsity This Week</caption>
                        <tbody id="varsity-body"></tbody>
                    </table>
                </div>
                <div id="home-jh-table" class="week-table-card" style="display: none;">
                    <table>
                        <caption id="jh-caption">JH This Week</caption>
                        <tbody id="jh-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
        <script src="scripts/script.js"></script>
        <script src="scripts/home-schedule.js"></script>
        <script>
            // Reuses the same toggle-switch pattern as the rest of the site,
            // just scoped to the homepage's varsity/jh card swap.
            const homeToggle = document.getElementById('home-toggle');
            const homeVarsityTable = document.getElementById('home-varsity-table');
            const homeJhTable = document.getElementById('home-jh-table');
            const homeVarsityLabel = document.getElementById('home-varsity-label');
            const homeJhLabel = document.getElementById('home-jh-label');

            homeToggle.addEventListener('change', () => {
                if (homeToggle.checked) {
                    homeVarsityTable.style.display = 'none';
                    homeJhTable.style.display = 'block';
                    homeVarsityLabel.classList.remove('active-label');
                    homeJhLabel.classList.add('active-label');
                } else {
                    homeVarsityTable.style.display = 'block';
                    homeJhTable.style.display = 'none';
                    homeVarsityLabel.classList.add('active-label');
                    homeJhLabel.classList.remove('active-label');
                }
            });
        </script>
    </body>

</html>
